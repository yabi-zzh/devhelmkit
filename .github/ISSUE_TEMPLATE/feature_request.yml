name: 功能请求
description: 提议一个新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢建议。提交前请先搜索已有 Issue，避免重复。
  - type: textarea
    id: problem
    attributes:
      label: 需求场景
      description: 说明该功能要解决的问题或使用场景。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 描述期望的 API 形态或行为。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 是否考虑过其他实现方式。
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: 补充信息
    validations:
      required: false